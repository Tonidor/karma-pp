# Coin toss with 200 agents
world_file: ../worlds/1_resource_world.yaml
mechanism_file: ../mechanisms/coin_toss.yaml
population:
  silent:
    n_agents: 200
    weight: 1.0
    agent_model:
      code: karma_pp.impl.agents.silent_resource_agent.SilentResourceAgent
      parameters:
        transition_matrix:
          - [0.8, 0.2]
          - [0.2, 0.8]
        urgency_levels: [1, 3]
        initial_urgency: 1
        reward_per_resource: [0.0]
        no_resource_penalty: [-1.0]
