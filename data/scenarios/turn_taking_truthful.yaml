# TurnTaking mechanism with TruthfulResourceAgent
# Use with: kpp vis access_fairness_vs_efficiency --scenario data/scenarios/turn_taking_truthful.yaml --steps 500
world_file: ../worlds/1_resource_world.yaml
mechanism_file: ../mechanisms/turn_taking.yaml
population:
  truthful:
    n_agents: 2
    weight: 1.0
    agent_model:
      code: karma_pp.impl.agents.truthful_resource_agent.TruthfulResourceAgent
      parameters:
        transition_matrix:
          - [0.8, 0.2]
          - [0.2, 0.8]
        urgency_levels: [1, 3]
        initial_urgency: 1
        reward_per_resource: [0.0]
        no_resource_penalty: [-1.0]
