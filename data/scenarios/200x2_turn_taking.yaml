  parameters:
    resource_capacities: [1]
    collective_size_distribution: {2: 1.0}

mechanism:
  code: karma_pp.impl.mechanisms.turn_taking.TurnTakingMechanism
  parameters: {}

population:
  truthful:
    n_agents: 200
    weight: 1.0
    agent_model:
      code: karma_pp.impl.agents.truthful_resource_agent.TruthfulResourceAgent
      parameters:
        transition_matrix:
          - [0.95, 0.05, 0.0]
          - [0.0, 0.5, 0.5]
          - [0.95, 0.05, 0.0]
        urgency_levels: [1, 1, 10]
        initial_urgency: 1
        reward_per_resource: [0.0]
        no_resource_penalty: [-1.0]
