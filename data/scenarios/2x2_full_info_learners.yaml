world_file: ../worlds/1_resource_world.yaml
mechanism_file: ../mechanisms/karma_mechanism.yaml
population:
  full_info:
    n_agents: 2
    weight: 1.0
    agent_model:
      code: karma_pp.impl.agents.full_info_learning_agent.FullInfoLearningAgent
      parameters:
        transition_matrix:
          - [0.8, 0.2]
          - [0.2, 0.8]
        urgency_levels: [0, 1]
        initial_urgency: 0
        reward_per_resource: [0.0]
        no_resource_penalty: [-1.0]
        # Learning parameters
        gamma: 0.99        # discount factor, must be in (0, 1)
        eta: 0.01          # policy learning rate
        lam: 10.0          # softmax temperature (higher = sharper best response)
        dt: 0.1            # evolutionary step size
        vi_tol: 1.0e-6     # value iteration convergence tolerance
        vi_max_iter: 1000  # max value iteration sweeps per step
